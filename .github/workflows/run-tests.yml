on:
  workflow_call:

jobs:
  grade:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write  # needed to post PR comments
      issues: write
    steps:
      # Check out the STUDENT's fastapi repo (the calling repo) at the PR merge
      # commit. In a workflow_call context the default checkout target is always
      # the calling (student's) repo — not this grader repo.
      - uses: actions/checkout@v4
        with:
          path: student-code

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Install the student's version of FastAPI directly from their fork.
      # FastAPI is a pure-Python package so pip install -e works without
      # any compiled extensions.
      - name: Install student's FastAPI and test dependencies
        run: pip install -e "./student-code[all]" pytest httpx inline-snapshot pytest-xdist

      # Check out this grader repo to get the custom test file.
      # For a private grader repo add: token: ${{ secrets.GRADER_TOKEN }}
      # (store a fine-grained PAT with read access as an org-level secret;
      # secrets: inherit in the template trigger will forward it automatically).
      - uses: actions/checkout@v4
        with:
          repository: AcademyDiscovery/fast-api-grader
          path: grader

      - name: Run grading tests
        id: test
        run: |
          set -o pipefail
          cd grader
          bash scripts/run_tests.sh -v 2>&1 | tee ../test_output.txt

      - name: Post PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('test_output.txt', 'utf8');
            const passed = '${{ steps.test.outcome }}' === 'success';
            const icon = passed ? '✅' : '❌';

            // Extract counts from the pytest summary line, e.g. "2 failed, 5 passed in 0.12s"
            const summaryLine = output.match(/^=+ (.+) =+$/m)?.[1] ?? '';
            const failedMatch = summaryLine.match(/(\d+) failed/);
            const passedMatch = summaryLine.match(/(\d+) passed/);
            const failedCount = failedMatch ? parseInt(failedMatch[1]) : 0;
            const passedCount = passedMatch ? parseInt(passedMatch[1]) : 0;

            let summary;
            if (passed) {
              summary = `All ${passedCount} tests passed.`;
            } else if (failedCount > 0) {
              summary = `${failedCount} test${failedCount > 1 ? 's' : ''} failed, ${passedCount} passed.`;
            } else {
              summary = summaryLine || 'Tests did not complete successfully.';
            }

            const MAX = 60_000;
            const displayOutput = output.length > MAX
              ? output.slice(0, MAX) + '\n\n… (output truncated)'
              : output;

            const body = [
              `## ${icon} Grading Results`,
              `**${summary}**`,
              '',
              '<details>',
              '<summary>Full test output</summary>',
              '',
              '```',
              displayOutput.trimEnd(),
              '```',
              '',
              '</details>',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
